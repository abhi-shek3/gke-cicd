apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  namespace: notes-app
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Strips the /api/auth prefix before sending the request to the FastAPI app
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # 1. Route for Auth Service
      - path: /api/auth(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: auth-service
            port:
              number: 8000
              
      # 2. Route for Notes Service
      - path: /api/notes(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: notes-service
            port:
              number: 8000
              
      # 3. Route for Frontend (Catch-all)
      - path: /()(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend-service
            port:
              number: 80