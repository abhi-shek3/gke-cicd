apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notes-app-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/abhi-shek3/gke-cicd.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: notes-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
